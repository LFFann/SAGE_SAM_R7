experiment:
  name: SAGE_SAM_R6_Smoke
  output_dir: outputs/SAGE_SAM_R6_Smoke
  seed: 2026
  deterministic: true

data:
  root: outputs/smoke_data/SAGE_SAM_R6
  dataset_name: smoke
  num_classes: 3
  image_size: 64
  in_channels: 3
  labeled_subdir: labeled
  unlabeled_subdir: unlabeled
  val_subdir: val
  test_subdir: test
  image_dir_name: image
  mask_dir_name: mask
  calibration_ratio: 0.25
  calibration_min_images: 1
  calibration_split_seed: 2026
  ignore_index: 255
  synthetic: true

train:
  device: cpu
  max_iterations: 3
  batch_size_labeled: 2
  batch_size_unlabeled: 2
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  amp: false
  grad_clip_norm: 5.0
  log_every: 1
  val_every: 3
  save_every: 2
  warmup_iterations: 1
  unsup_ramp_iterations: 1
  gradient_accumulation: 1

model:
  deploy_backbone: dual_fusion
  branch_a: unet
  branch_b: morph_unet2d
  fusion: ham_lite
  base_channels: 8
  fusion_hidden_channels: 8
  use_boundary_head: true
  feature_dim: 64
  complementary_dropout_p: 0.2

teacher:
  fast_ema_decay: 0.9
  slow_ema_decay: 0.99
  slow_refresh_every: 2
  slow_refresh_min_delta: 0.0
  slow_min_dwell: 1
  use_bn_eval_for_teacher: true

sam:
  use_sam: false
  model_type: vit_b
  checkpoint: ./checkpoints/sam_vit_b_01ec64.pth
  device: cpu
  image_size: 1024
  train_peft: false
  peft_type: lora_adapter
  train_last_n_blocks: 0
  max_trainable_ratio: 0.05
  train_mask_decoder: false
  train_prompt_generator: false
  freeze_prompt_encoder: true
  self_reliance_start: 3
  self_reliance_decay: 0.999
  self_reliance_min_weight: 0.05
  keep_labeled_sam_sup: true
  utility_ema_decay: 0.9
  disable_semantic_kd_after_no_gain: 1
  prompt:
    use_mask_prompt: true
    use_box_prompt: true
    use_point_prompt: true
    use_negative_points: true
    mask_prompt_size: 256
    min_component_area: 4
  losses:
    sam_sup_weight: 0.0
    sam_unsup_weight: 0.0
    sam_student_kd_weight: 0.0
    sam_boundary_weight: 0.0
    sam_relation_weight: 0.0

calibration:
  alpha: 0.05
  min_pixels_per_class: 8
  start_iter: 2
  update_every: 2
  momentum: 0.8
  classwise: true
  use_soft_gate: true
  use_calibration_split: true
  min_participation_ratio: 0.10
  max_quantile_clip: 0.97
  temperature: 0.05
  coverage_target: 0.20
  update_only_after_warmup: true

pseudo:
  foreground_classes: [1, 2]
  singleton_weight: 1.0
  set_weight: 0.5
  fuzzy_weight: 0.25
  rank_weight: 0.1
  negative_weight: 0.1
  correlation_weight: 0.05
  locality_weight: 0.02
  relation_weight: 0.0
  boundary_weight: 0.0
  rank_margin: 0.5
  safe_negative_threshold: 0.05
  safe_negative_sam_threshold: 0.30
  safe_negative_rank_low: 2
  safe_negative_rank_high: 2
  safe_negative_max_prob: 0.40
  max_candidate_set_size: 2
  empty_candidate_topk_foreground: 1
  min_empty_foreground_score: 0.01
  min_teacher_confidence: 0.3
  min_sam_confidence: 0.5
  min_foreground_score: 0.01
  min_fg_pixels_per_class_ratio: 0.01
  max_background_hard_ratio: 0.70
  max_bg_to_fg_ratio: 4.0
  disable_bg_if_no_fg: true
  collapse_sentinel_enabled: true
  collapse_min_fg_ratio_per_class: 0.01
  collapse_max_background_hard_ratio: 0.50
  collapse_force_fg_ratio_per_class: 0.01
  collapse_disable_background_hard: true
  collapse_teacher_fallback_weight: 1.0
  collapse_min_candidate_score: 0.0
  sam_foreground_low: 0.10
  sam_boundary_uncertain_threshold: 0.10
  sam_fuzzy_support_weight: 0.25
  sam_region_min_weight: 0.05

r6:
  foreground_grounding_start: 1
  correlation_locality_start: 2
  self_reliance_start: 3
  disable_background_unsup_until: 1
  min_fast_slow_agreement: 0.0
  low_agreement_unsup_scale: 0.25
  self_reliance_ssl_scale: 0.50

losses:
  branch_sup_weight: 0.5
  branch_ssl_weight: 0.5
  conflict_review_weight: 0.1
  fusion_sup_weight: 1.0

structure:
  use_online_relation: false
  online_topk: 4
  relation_resolution: 8
  relation_temperature: 0.2
  relation_rank_weight: 0.25
  correlation_topk: 4
  correlation_resolution: 8
  correlation_temperature: 0.2
  correlation_min_weight: 0.10
  use_cache: false

locality:
  mask_ratio: 0.30
  patch_size: 8
  fill: mean

augmentation:
  weak:
    random_flip: true
  strong:
    gamma_range: [0.8, 1.2]
    gain_range: [0.9, 1.1]
    speckle_std_range: [0.0, 0.05]
    patch_mask_prob: 0.2
    patch_mask_ratio: 0.2

eval:
  batch_size: 1
  save_prediction: true
  compute_hd95: false
  exclude_background_for_avg: true
