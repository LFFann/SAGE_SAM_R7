experiment:
  name: SAGE_SAM_R7_3Class_V100_Tuned_SAMDisagree
  output_dir: outputs/SAGE_SAM_R7_3Class_V100_Tuned_SAMDisagree
  seed: 2026
  deterministic: false

data:
  root: /root/autodl-tmp/echoData
  dataset_name: 260513_data_labeled30pct
  num_classes: 3
  image_size: 256
  in_channels: 3
  labeled_subdir: labeled
  unlabeled_subdir: unlabeled
  val_subdir: val
  test_subdir: test
  image_dir_name: image
  mask_dir_name: mask
  calibration_ratio: 0.15
  calibration_min_images: 4
  calibration_split_seed: 2026
  ignore_index: 255
  synthetic: false

train:
  device: cuda
  max_iterations: 8000
  batch_size_labeled: 4
  batch_size_unlabeled: 4
  num_workers: 8
  lr: 0.0003
  lr_schedule: cosine
  lr_decay_start_iteration: 750
  min_lr_ratio: 0.12
  weight_decay: 0.0001
  optimizer: adamw
  amp: true
  grad_clip_norm: 1.0
  log_every: 20
  val_every: 250
  save_every: 500
  warmup_iterations: 1200
  unsup_ramp_iterations: 8000
  gradient_accumulation: 2
  deploy_best_checkpoint: true
  stop_on_val_collapse: true
  val_collapse_delta: 0.15
  val_collapse_patience: 2
  val_collapse_min_iter: 1500

model:
  deploy_backbone: dual_fusion
  branch_a: unet
  branch_b: morph_unet2d
  fusion: ham_lite
  base_channels: 32
  fusion_hidden_channels: 32
  use_boundary_head: true
  complementary_dropout_p: 0.2

teacher:
  fast_ema_decay: 0.99
  slow_ema_decay: 0.999
  slow_refresh_every: 500
  use_bn_eval_for_teacher: true

sam:
  use_sam: true
  model_type: vit_b
  checkpoint: /root/autodl-tmp/sam_vit_b_01ec64.pth
  device: cuda
  image_size: 1024
  train_peft: true
  peft_type: adapter
  train_last_n_blocks: 4
  max_trainable_ratio: 0.05
  lora_rank: 4
  lora_alpha: 8
  adapter_dim: 32
  train_mask_decoder: false
  train_prompt_generator: true
  freeze_prompt_encoder: true
  self_reliance_start: 6000
  self_reliance_decay: 0.999
  self_reliance_min_weight: 0.03
  keep_labeled_sam_sup: true
  lr_peft: 0.00002
  lr_prompt: 0.0002
  lr_mask_decoder: 0.0
  utility_ema_decay: 0.9
  disable_semantic_kd_after_no_gain: 2
  kd_temperature: 1.0
  prompt:
    use_mask_prompt: true
    use_box_prompt: true
    use_point_prompt: false
    use_negative_points: false
    mask_prompt_size: 256
    min_component_area: 16
    residual_scale: 0.10
    box_threshold: 0.35
    max_box_area_ratio: 0.12
    fallback_box_half_size: 0.035
    valid_min_peak: 0.20
    max_components_per_class: [0, 2, 1]
  losses:
    sam_sup_weight: 0.28
    sam_unsup_weight: 0.00
    sam_student_kd_weight: 0.015
    sam_extent_weight: 0.00
    sam_extent_target_mix: 0.70
    sam_kd_min_effective_weight: 0.00025
    sam_kd_min_effective_after: 1500
    sam_kd_min_effective_gate_ratio: 0.004
    sam_boundary_weight: 0.02
    sam_relation_weight: 0.00

r6:
  foreground_grounding_start: 1500
  correlation_locality_start: 4500
  self_reliance_start: 6000
  disable_background_unsup_until: 2400
  min_fast_slow_agreement: 0.12
  low_agreement_unsup_scale: 0.15
  stage1_unsup_max_scale: 0.10
  stage1_sam_max_scale: 0.06
  self_reliance_ssl_scale: 0.35

trust:
  enabled: true
  start_iter: 1000
  min_candidate_foreground_ratio: 0.025
  prior_calibrated_min_foreground: true
  min_candidate_prior_multiplier: 0.85
  min_candidate_foreground_floor: 0.006
  min_candidate_foreground_ceiling: 0.025
  min_class_prior_multiplier: 0.55
  min_class_foreground_floor: 0.0015
  prior_calibrated_max_foreground: true
  max_candidate_prior_multiplier: 1.60
  max_candidate_foreground_floor: 0.014
  max_candidate_foreground_ceiling: 0.05
  max_class_prior_multiplier: 2.0
  max_class_foreground_floor: 0.006
  max_candidate_foreground_ratio: 0.05
  min_class_foreground_ratio: [0.0, 0.004, 0.004]
  max_class_foreground_ratio: [0.0, 0.14, 0.10]
  max_safe_negative_pixel_ratio: 0.55
  max_class_safe_negative_ratio: 0.35
  max_background_hard_ratio: 0.35
  min_sam_foreground_support_ratio: 0.006
  max_sam_gate_without_support: 0.030
  max_sam_gate_to_support_ratio: 3.0
  sam_support_ratio_floor: 0.004
  max_pre_ceiling_foreground_ratio: [0.0, 0.12, 0.10]
  low_support_sam_scale: 0.10
  sam_overgate_marks_unsafe: true
  unsafe_unsup_scale: 0.05
  unsafe_sam_scale: 0.10
  unsafe_negative_scale: 0.0
  disable_correlation_when_unsafe: true
  disable_locality_when_unsafe: true

calibration:
  alpha: 0.05
  min_pixels_per_class: 128
  start_iter: 1000
  update_every: 250
  momentum: 0.8
  classwise: true
  use_soft_gate: true
  use_calibration_split: true
  min_participation_ratio: 0.25
  max_quantile_clip: 0.95
  temperature: 0.05
  coverage_target: 0.40
  update_only_after_warmup: true

pseudo:
  foreground_classes: [1, 2]
  singleton_weight: 1.0
  set_weight: 0.55
  fuzzy_weight: 0.35
  rank_weight: 0.08
  negative_weight: 0.05
  correlation_weight: 0.10
  locality_weight: 0.03
  relation_weight: 0.00
  boundary_weight: 0.03
  rank_margin: 0.5
  sam_role: verifier
  min_sam_verifier_score: 0.25
  background_max_verifier_score: 0.15
  bounded_safe_negative: true
  bounded_foreground_candidates: true
  use_labeled_foreground_prior: true
  use_labeled_prior_distribution_alignment: true
  prior_alignment_strength: 0.35
  prior_alignment_min_ratio: 0.10
  prior_alignment_max_ratio: 5.0
  prior_alignment_include_background: true
  prior_calibrated_foreground_budget: true
  foreground_prior_cap_multiplier: 1.35
  foreground_prior_min_cap: [0.0, 0.0045, 0.0035]
  foreground_prior_max_cap: [0.0, 0.018, 0.012]
  foreground_prior_min_ratio_multiplier: 0.55
  foreground_prior_min_ratio_floor: 0.0015
  foreground_prior_collapse_min_multiplier: 0.45
  foreground_prior_collapse_force_multiplier: 0.70
  foreground_prior_collapse_floor: 0.0010
  max_foreground_candidate_ratio: 0.035
  max_fg_candidate_ratio_per_class: [0.0, 0.04, 0.03]
  foreground_ceiling_verifier_weight: 0.15
  use_background_from_foreground_ceiling: true
  background_candidate_min_confidence: 0.70
  max_background_from_ceiling_ratio: 0.08
  max_safe_negative_ratio_per_class: 0.25
  safe_negative_to_positive_ratio: 2.0
  safe_negative_min_pixels_per_class: 0
  allow_negative_without_positive: false
  safe_negative_threshold: 0.05
  safe_negative_sam_threshold: 0.25
  safe_negative_rank_low: 2
  safe_negative_rank_high: 2
  safe_negative_max_prob: 0.35
  max_candidate_set_size: 2
  empty_candidate_topk_foreground: 1
  bounded_empty_foreground_fallback: true
  empty_foreground_fallback_cap_scale: 0.75
  bounded_empty_candidate_recovery: true
  empty_candidate_recovery_cap_scale: 0.75
  min_empty_foreground_score: 0.01
  min_teacher_confidence: 0.50
  min_sam_confidence: 0.60
  sam_train_gate_use_kd_agreement: true
  sam_kd_require_teacher_agreement: true
  sam_kd_allow_boundary_without_support: false
  sam_kd_min_support: 0.08
  sam_kd_min_teacher_confidence: 0.03
  sam_kd_min_verifier_score: 0.30
  sam_guided_pseudo_enabled: false
  sam_guided_support_min: 0.08
  sam_guided_teacher_min: 0.03
  sam_guided_verifier_min: 0.30
  sam_guided_min_margin: 0.02
  sam_guided_candidate_cap_scale: 0.65
  sam_guided_singleton_support_min: 0.14
  sam_guided_singleton_teacher_min: 0.08
  sam_guided_singleton_cap_scale: 0.30
  sam_guided_soft_weight: 0.65
  sam_disagreement_suppression_enabled: true
  sam_disagreement_support_max: 0.04
  sam_disagreement_verifier_max: 0.52
  sam_disagreement_teacher_max: 0.42
  sam_disagreement_candidate_cap_scale: 0.75
  sam_disagreement_score_scale: 0.0
  sam_disagreement_min_score: 0.01
  sam_disagreement_background_floor: 0.20
  min_foreground_score: 0.01
  min_fg_pixels_per_class_ratio: [0.0, 0.0040, 0.0030]
  max_background_hard_ratio: 0.35
  max_bg_to_fg_ratio: 2.0
  disable_bg_if_no_fg: true
  collapse_sentinel_enabled: true
  collapse_min_fg_ratio_per_class: [0.0, 0.0030, 0.0022]
  collapse_max_background_hard_ratio: 0.30
  collapse_force_fg_ratio_per_class: [0.0, 0.0042, 0.0032]
  collapse_disable_background_hard: true
  collapse_teacher_fallback_weight: 1.0
  collapse_min_candidate_score: 0.0
  sam_foreground_low: 0.12
  sam_structure_mask_min_support: 0.08
  sam_boundary_uncertain_threshold: 0.10
  sam_fuzzy_support_weight: 0.20
  sam_region_min_weight: 0.05

losses:
  branch_sup_weight: 0.5
  branch_ssl_weight: 0.5
  conflict_review_weight: 0.2
  fusion_sup_weight: 1.0

structure:
  use_online_relation: false
  online_topk: 8
  relation_resolution: 16
  relation_temperature: 0.2
  relation_rank_weight: 0.25
  correlation_topk: 8
  correlation_resolution: 16
  correlation_temperature: 0.2
  correlation_min_weight: 0.20
  use_cache: false

locality:
  mask_ratio: 0.20
  patch_size: 16
  fill: mean

augmentation:
  weak:
    random_flip: true
  strong:
    gamma_range: [0.80, 1.25]
    gain_range: [0.90, 1.10]
    speckle_std_range: [0.0, 0.05]
    patch_mask_prob: 0.20
    patch_mask_ratio: 0.15

eval:
  batch_size: 1
  save_prediction: true
  compute_hd95: true
  exclude_background_for_avg: true
  baseline:
    avg_dice: 0.7601364254951477
    class_dice: [null, 0.7218010774222662, 0.7984717713624256]

diagnostics:
  train_visualize_every: 250
  train_visualize_first: true
  train_visualize_max_samples: 1
